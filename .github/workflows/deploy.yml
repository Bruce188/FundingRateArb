name: Deploy to Azure

on:
  push:
    branches: [main]
    paths-ignore:
      - 'documentation/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: 'fundingratearb'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Test@12345678!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Test@12345678!' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit tests
        run: |
          set +e
          dotnet test tests/FundingRateArb.Tests.Unit \
            --no-build -c Release \
            --logger "trx;LogFileName=unit.trx" \
            --collect:"XPlat Code Coverage" \
            --settings coverage.runsettings
          TEST_EXIT=$?
          # Known post-teardown test-host crash with Microsoft.NET.Test.Sdk 17.8 on net8.0:
          # all tests pass, then host crashes during cleanup. Treat as success iff the TRX
          # records zero failed tests. A real test failure still fails the step.
          TRX=$(find tests/FundingRateArb.Tests.Unit/TestResults -name unit.trx 2>/dev/null | head -1)
          if [ -z "$TRX" ]; then
            echo "::error::No TRX produced"
            exit "$TEST_EXIT"
          fi
          # Use Counters element (authoritative) rather than grepping outcome="Failed",
          # because the TRX's top-level ResultSummary is marked outcome="Failed" whenever
          # the host aborts — even if every individual UnitTestResult passed.
          FAILED=$(grep -oE '<Counters[^>]*\sfailed="[0-9]+"' "$TRX" | grep -oE 'failed="[0-9]+"' | grep -oE '[0-9]+' | head -1)
          PASSED=$(grep -oE '<Counters[^>]*\spassed="[0-9]+"' "$TRX" | grep -oE 'passed="[0-9]+"' | grep -oE '[0-9]+' | head -1)
          FAILED=${FAILED:-0}
          PASSED=${PASSED:-0}
          echo "TRX Counters: $PASSED passed, $FAILED failed (host exit $TEST_EXIT)"
          if [ "$TEST_EXIT" -ne 0 ] && [ "$FAILED" -eq 0 ] && [ "$PASSED" -gt 0 ]; then
            echo "::warning::Unit test host crashed post-teardown; all tests passed in TRX. Accepting."
            exit 0
          fi
          exit "$TEST_EXIT"

      - name: Check code coverage threshold
        run: |
          REPORT=$(find . -name "coverage.cobertura.xml" -path "*/TestResults/*" | head -1)
          # TRX Counters — authoritative source of pass/fail, matches the tolerance
          # applied in the Unit tests step above. Used here to distinguish "host crashed
          # before coverage was written" (accept) from "coverage genuinely low" (fail).
          TRX=$(find tests/FundingRateArb.Tests.Unit/TestResults -name unit.trx 2>/dev/null | head -1)
          # The outer grep matches the full <Counters ... failed="N"> substring; that
          # substring also contains earlier numeric attributes (total, executed, passed),
          # so the inner grep must re-anchor on failed="N"/passed="N" before extracting
          # the digits. Without the middle grep we'd pick up `total`'s value by accident.
          TRX_FAILED=$(grep -oE '<Counters[^>]*\sfailed="[0-9]+"' "$TRX" 2>/dev/null | grep -oE 'failed="[0-9]+"' | grep -oE '[0-9]+' | head -1)
          TRX_PASSED=$(grep -oE '<Counters[^>]*\spassed="[0-9]+"' "$TRX" 2>/dev/null | grep -oE 'passed="[0-9]+"' | grep -oE '[0-9]+' | head -1)
          TRX_FAILED=${TRX_FAILED:-0}
          TRX_PASSED=${TRX_PASSED:-0}
          HOST_CRASH_BUT_TESTS_PASSED=$([ "$TRX_FAILED" -eq 0 ] && [ "$TRX_PASSED" -gt 0 ] && echo 1 || echo 0)

          if [ -z "$REPORT" ]; then
            if [ "$HOST_CRASH_BUT_TESTS_PASSED" = "1" ]; then
              echo "::warning::No coverage report produced but all unit tests passed in TRX ($TRX_PASSED passed) — presumed post-teardown host crash; accepting."
              exit 0
            fi
            echo "::error::No coverage report found"
            exit 1
          fi
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$REPORT" | head -1)
          if [ -z "$LINE_RATE" ] || ! echo "$LINE_RATE" | grep -qE '^[0-9]+\.?[0-9]*$'; then
            if [ "$HOST_CRASH_BUT_TESTS_PASSED" = "1" ]; then
              echo "::warning::Coverage line-rate unreadable but all unit tests passed in TRX ($TRX_PASSED passed) — presumed post-teardown host crash; accepting."
              exit 0
            fi
            echo "::error::Failed to extract line-rate from coverage report"
            exit 1
          fi
          PERCENTAGE=$(awk "BEGIN {printf \"%.1f\", $LINE_RATE * 100}")
          echo "Line coverage: ${PERCENTAGE}%"
          # THRESHOLD is a ratio (0.14 = 14%)
          THRESHOLD=0.14
          # Use integer comparison (x10000) to avoid floating-point boundary issues
          COVERAGE_INT=$(awk "BEGIN {printf \"%d\", $LINE_RATE * 10000}")
          THRESHOLD_INT=$(awk "BEGIN {printf \"%d\", $THRESHOLD * 10000}")
          if [ "$COVERAGE_INT" -lt "$THRESHOLD_INT" ]; then
            # Tolerance scope: only accept when coverage is *exactly zero* and the test
            # host crashed while tests passed. A non-zero-but-low reading (e.g., 5%) is a
            # genuine coverage regression and still fails.
            if [ "$COVERAGE_INT" -eq 0 ] && [ "$HOST_CRASH_BUT_TESTS_PASSED" = "1" ]; then
              echo "::warning::Coverage reported 0% but all unit tests passed in TRX ($TRX_PASSED passed) — presumed post-teardown host crash; accepting."
              exit 0
            fi
            THRESHOLD_PCT=$(awk "BEGIN {printf \"%.0f\", $THRESHOLD * 100}")
            echo "::error::Code coverage ${PERCENTAGE}% is below the ${THRESHOLD_PCT}% threshold"
            exit 1
          fi

      - name: Integration tests
        run: dotnet test tests/FundingRateArb.Tests.Integration --no-build -c Release --logger "trx;LogFileName=integration.trx"
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=FundingRateArbTestDb;User Id=SA;Password=Test@12345678!;TrustServerCertificate=True"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/**/coverage.cobertura.xml

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected"
            exit 1
          fi

      - name: Scan for secrets in diff
        run: |
          if ! DIFF=$(git diff origin/main...HEAD -- '*.cs' '*.json' '*.yml' '*.yaml' '*.config' '*.xml' '*.md' '*.sh' '*.txt' '*.env*' 'Dockerfile*' 2>&1); then
            echo "::warning::git diff failed — secret scanning skipped. Output: $DIFF"
            exit 0
          fi
          if [ -z "$DIFF" ]; then
            echo "::warning::Empty diff — no changes to scan for secrets"
            exit 0
          fi
          COMBINED_PATTERN='AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\-_]{35}|-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----|(?<!//\s)(?<!#\s)Password\s*=\s*[^;"\x27]{8,}|api[_-]?key\s*[:=]\s*["\x27][A-Za-z0-9\-_]{20,}|secret[_-]?key\s*[:=]\s*["\x27][A-Za-z0-9\-_]{20,}'
          # Known false positives: CI/test passwords, placeholder values
          ALLOWLIST='Password\s*=\s*"?[A-Za-z]+@[0-9]+!?"?|Password=Unused@[0-9]+|example\.com|placeholder'
          MATCHES=$(printf '%s\n' "$DIFF" | grep -Pi "$COMBINED_PATTERN" | grep -Piv "$ALLOWLIST" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Potential secrets detected in diff:"
            printf '%s\n' "$MATCHES"
            exit 1
          fi

      - name: Publish
        run: dotnet publish src/FundingRateArb.Web/FundingRateArb.Web.csproj -c Release -o ./publish --no-build

      - name: Generate EF migration bundle
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          dotnet ef migrations bundle \
            --project src/FundingRateArb.Infrastructure/FundingRateArb.Infrastructure.csproj \
            --startup-project src/FundingRateArb.Web/FundingRateArb.Web.csproj \
            --self-contained \
            --force \
            -o ./publish/efbundle

      - name: Upload deploy package
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ./publish

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package
          path: ./publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run EF migrations
        run: |
          chmod +x ./publish/efbundle
          CLEAN_CONN=$(printf '%s' "$SQL_CONN" | tr -d '\r\n' | tr -s ' ')
          ./publish/efbundle --connection "$CLEAN_CONN"
        env:
          SQL_CONN: ${{ secrets.SQL_CONNECTION_STRING }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ./publish
