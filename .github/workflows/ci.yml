name: CI

on:
  # Main branch builds handled by deploy.yml
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Test@12345678!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Test@12345678!' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >-
          dotnet test tests/FundingRateArb.Tests.Unit
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Check code coverage threshold
        run: |
          REPORT=$(find . -name "coverage.cobertura.xml" -path "*/TestResults/*" | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No coverage report found"
            exit 1
          fi
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$REPORT" | head -1)
          if [ -z "$LINE_RATE" ] || ! echo "$LINE_RATE" | grep -qE '^[0-9]+\.?[0-9]*$'; then
            echo "::error::Failed to extract line-rate from coverage report"
            exit 1
          fi
          PERCENTAGE=$(awk "BEGIN {printf \"%.1f\", $LINE_RATE * 100}")
          echo "Line coverage: ${PERCENTAGE}%"
          # THRESHOLD is a ratio (0.15 = 15%)
          THRESHOLD=0.15
          if awk "BEGIN {exit !($LINE_RATE < $THRESHOLD)}"; then
            THRESHOLD_PCT=$(awk "BEGIN {printf \"%.0f\", $THRESHOLD * 100}")
            echo "::error::Code coverage ${PERCENTAGE}% is below the ${THRESHOLD_PCT}% threshold"
            exit 1
          fi

      - name: Run integration tests
        run: dotnet test tests/FundingRateArb.Tests.Integration --no-build --configuration Release --logger "trx;LogFileName=integration-results.trx"
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=FundingRateArbTestDb;User Id=SA;Password=Test@12345678!;TrustServerCertificate=True"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/**/coverage.cobertura.xml

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected"
            exit 1
          fi

      - name: Scan for secrets in diff
        run: |
          if ! DIFF=$(git diff origin/main...HEAD -- '*.cs' '*.json' '*.yml' '*.yaml' '*.config' '*.xml' '*.md' '*.sh' '*.txt' '*.env*' 'Dockerfile*' 2>&1); then
            echo "::warning::git diff failed — secret scanning skipped. Output: $DIFF"
            exit 0
          fi
          if [ -z "$DIFF" ]; then
            echo "::warning::Empty diff — no changes to scan for secrets"
            exit 0
          fi
          COMBINED_PATTERN='AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\-_]{35}|-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----|Password\s*=\s*[^;]{8,}|api[_-]?key\s*[:=]\s*["\x27][A-Za-z0-9\-_]{20,}|secret[_-]?key\s*[:=]\s*["\x27][A-Za-z0-9\-_]{20,}'
          # Known false positives: exact CI test password, placeholder values
          ALLOWLIST='Test@12345678!|Password=Unused@12345|example\.com|placeholder'
          MATCHES=$(printf '%s\n' "$DIFF" | grep -PiE "$COMBINED_PATTERN" | grep -PivE "$ALLOWLIST" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Potential secrets detected in diff:"
            printf '%s\n' "$MATCHES"
            exit 1
          fi

      - name: Check package licenses
        continue-on-error: true
        run: |
          dotnet tool install --global dotnet-project-licenses --version 2.*
          dotnet-project-licenses --input FundingRateArb.sln --allowed-license-types allowed-licenses.json --output table

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fundingratearb:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run --rm -d --name smoke-test \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e "ConnectionStrings__DefaultConnection=Server=localhost;Database=test;User Id=SA;Password=Unused@12345;TrustServerCertificate=True" \
            -e "Seed__AdminPassword=Test@12345678!" \
            fundingratearb:${{ github.sha }}
          sleep 5
          docker logs smoke-test 2>&1 | head -20
          docker stop smoke-test 2>/dev/null || true
